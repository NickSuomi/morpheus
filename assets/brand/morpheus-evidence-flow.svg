<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Morpheus — From dream to evidence</title>
  <desc id="desc">A dark Morpheus hero graphic showing dream intent becoming evidence under human merge authority.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#101a24"/>
      <stop offset="58%" stop-color="#070d13"/>
      <stop offset="100%" stop-color="#04080c"/>
    </radialGradient>
    <linearGradient id="lineGrey" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#73808d" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#9aa6b2" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f3f6f8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7fbff" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#56a5ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2f84e8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="mark" x1="650" y1="390" x2="950" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.58 0 0 0 0 1 0 0 0 0.35 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg { fill: url(#bgGlow); }
      .small { font: 600 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.42em; fill: #b8c0c9; }
      .headline { font: 600 70px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f2f5f7; letter-spacing: -0.025em; }
      .sub { font: 600 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.48em; fill: #b6bec7; }
      .label { font: 650 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.36em; fill: #f4f7f9; }
      .labelSmall { font: 600 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.42em; fill: #bac3cd; }
      .bottom { font: 650 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.42em; fill: #f4f7f9; }
      .bottomSmall { font: 600 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.38em; fill: #b7c0ca; }
      .divider { stroke:#d7dde4; stroke-opacity:.15; stroke-width:1; }
      .axis { stroke:#c9d2dc; stroke-opacity:.28; stroke-width:1; }
      .node { stroke:#cbd5df; stroke-opacity:.65; stroke-width:1; fill:#071017; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text class="small" x="800" y="76" text-anchor="middle">A CONTROLLED WORKFLOW FOR AI OPERATORS</text>
  <text class="headline" x="800" y="155" text-anchor="middle">From dream to evidence</text>
  <text class="sub" x="800" y="203" text-anchor="middle">UNDER HUMAN MERGE AUTHORITY</text>
  <line class="divider" x1="170" y1="254" x2="1430" y2="254"/>

  <!-- dream particles -->
  <g opacity="0.9">
    <circle cx="100" cy="407" r="1.1" fill="#e8edf2" opacity="0.22"/><circle cx="132" cy="356" r="1.3" fill="#e8edf2" opacity="0.26"/>
    <circle cx="160" cy="441" r="1.2" fill="#e8edf2" opacity="0.30"/><circle cx="196" cy="379" r="1.4" fill="#e8edf2" opacity="0.38"/>
    <circle cx="214" cy="493" r="1.1" fill="#e8edf2" opacity="0.28"/><circle cx="245" cy="334" r="1.5" fill="#e8edf2" opacity="0.30"/>
    <circle cx="274" cy="438" r="1.7" fill="#e8edf2" opacity="0.44"/><circle cx="304" cy="381" r="1.1" fill="#e8edf2" opacity="0.32"/>
    <circle cx="333" cy="501" r="1.3" fill="#e8edf2" opacity="0.35"/><circle cx="360" cy="347" r="1.6" fill="#e8edf2" opacity="0.42"/>
    <circle cx="387" cy="420" r="1.2" fill="#e8edf2" opacity="0.50"/><circle cx="415" cy="471" r="1.1" fill="#e8edf2" opacity="0.48"/>
    <circle cx="452" cy="397" r="1.5" fill="#e8edf2" opacity="0.55"/><circle cx="482" cy="447" r="1.0" fill="#e8edf2" opacity="0.52"/>
  </g>
  <g opacity="0.55">
    <circle cx="145" cy="445" r="1.1" fill="#f5f7fa"/><circle cx="178" cy="416" r="1.1" fill="#f5f7fa"/><circle cx="206" cy="399" r="1.2" fill="#f5f7fa"/><circle cx="232" cy="459" r="1.0" fill="#f5f7fa"/><circle cx="265" cy="366" r="1.2" fill="#f5f7fa"/>
    <circle cx="292" cy="423" r="1.3" fill="#f5f7fa"/><circle cx="315" cy="454" r="1.1" fill="#f5f7fa"/><circle cx="344" cy="400" r="1.2" fill="#f5f7fa"/><circle cx="370" cy="432" r="1.0" fill="#f5f7fa"/><circle cx="404" cy="380" r="1.2" fill="#f5f7fa"/>
  </g>

  <!-- left dream label -->
  <text class="label" x="292" y="491" text-anchor="middle">DREAM</text>
  <text class="labelSmall" x="292" y="527" text-anchor="middle">INTENT</text>

  <!-- converging dream streams -->
  <g stroke="url(#lineGrey)" stroke-width="1.25" fill="none" stroke-linecap="round" opacity="0.92">
    <path d="M410 375 C520 374 590 402 700 446"/>
    <path d="M410 390 C520 389 596 411 700 448"/>
    <path d="M410 405 C530 405 600 419 700 450"/>
    <path d="M410 420 C540 420 612 431 700 452"/>
    <path d="M410 435 C535 438 612 443 700 454"/>
    <path d="M410 450 C530 454 605 458 700 456"/>
    <path d="M410 465 C530 470 596 469 700 458"/>
    <path d="M410 480 C520 487 588 481 700 460"/>
  </g>

  <!-- central mark and authority axis -->
  <line class="axis" x1="800" y1="285" x2="800" y2="688"/>
  <circle class="node" cx="800" cy="285" r="6"/>
  <circle class="node" cx="800" cy="688" r="6"/>
  <g filter="url(#softGlow)">
    <path d="M706 390 H771 C790 408 797 432 797 450 C797 468 790 492 771 510 H706 Z" fill="url(#mark)"/>
    <path d="M894 390 H829 C810 408 803 432 803 450 C803 468 810 492 829 510 H894 Z" fill="url(#mark)"/>
  </g>

  <!-- evidence streams -->
  <g stroke="url(#lineBlue)" stroke-width="1.35" fill="none" stroke-linecap="round" opacity="0.98">
    <path d="M894 450 C1005 340 1135 310 1260 314"/>
    <path d="M894 450 C1010 370 1140 352 1260 351"/>
    <path d="M894 450 C1020 398 1140 390 1260 388"/>
    <path d="M894 450 C1030 429 1140 426 1260 425"/>
    <path d="M894 450 C1045 453 1150 459 1260 462"/>
    <path d="M894 450 C1030 493 1140 528 1260 534"/>
    <path d="M894 450 C1010 525 1140 566 1260 570"/>
    <path d="M894 450 C1000 555 1135 604 1260 606"/>
  </g>
  <g fill="#5aa8ff">
    <circle cx="1260" cy="314" r="3.4"/><circle cx="1260" cy="351" r="3.4"/><circle cx="1260" cy="388" r="3.4"/><circle cx="1260" cy="425" r="3.4"/>
    <circle cx="1260" cy="462" r="3.4"/><circle cx="1260" cy="534" r="3.4"/><circle cx="1260" cy="570" r="3.4"/><circle cx="1260" cy="606" r="3.4"/>
  </g>

  <!-- right evidence label -->
  <text class="label" x="1328" y="491" text-anchor="middle">EVIDENCE</text>
  <text class="labelSmall" x="1328" y="527" text-anchor="middle">TRANSCRIPTS · LOGS · ARTIFACTS</text>

  <!-- bottom authority -->
  <text class="bottom" x="800" y="773" text-anchor="middle">HUMAN MERGE AUTHORITY</text>
  <text class="bottomSmall" x="800" y="812" text-anchor="middle">YOU DECIDE WHAT BECOMES REAL</text>
</svg>
