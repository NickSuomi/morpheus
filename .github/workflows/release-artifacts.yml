name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            artifact_os: darwin
            artifact_arch: arm64
          - runner: macos-13
            artifact_os: darwin
            artifact_arch: x64
          - runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build release artifacts
        run: |
          scripts/package-release.sh --version "${{ steps.version.outputs.version }}" --only-os "${{ matrix.artifact_os }}" --only-arch "${{ matrix.artifact_arch }}"
          cp scripts/install.sh dist/release/install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: morpheus-release-artifacts-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          if-no-files-found: error
          path: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
            dist/release/install.sh
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
            dist/release/install.sh
